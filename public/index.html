<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>広告LP URL取得ツール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </div>
          <h1>Ad LP Finder</h1>
        </div>
        <p class="subtitle">Meta / Google 広告ライブラリからLP URLを一括取得</p>
      </div>
    </header>

    <!-- Search Section -->
    <main class="main">
      <div class="search-card">
        <div class="search-row">
          <div class="input-group input-keyword">
            <label>キーワード</label>
            <input type="text" id="keyword" placeholder="例: 買取、不動産、保険..." autofocus>
          </div>
          <div class="input-group input-country">
            <label>国/地域</label>
            <select id="country">
              <option value="jp" selected>🇯🇵 日本</option>
              <option value="us">🇺🇸 アメリカ</option>
              <option value="gb">🇬🇧 イギリス</option>
              <option value="au">🇦🇺 オーストラリア</option>
              <option value="de">🇩🇪 ドイツ</option>
              <option value="fr">🇫🇷 フランス</option>
              <option value="kr">🇰🇷 韓国</option>
              <option value="tw">🇹🇼 台湾</option>
            </select>
          </div>
          <div class="input-group input-pages">
            <label>ページ数</label>
            <select id="maxPages">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="5">5</option>
              <option value="10">10</option>
            </select>
          </div>
        </div>

        <div class="platform-row">
          <div class="platform-checks">
            <label class="chip chip-meta">
              <input type="checkbox" id="platformMeta" checked>
              <span class="chip-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.04c-5.5 0-10 4.49-10 10.02 0 5 3.66 9.15 8.44 9.9v-7H7.9v-2.9h2.54V9.85c0-2.51 1.49-3.89 3.78-3.89 1.09 0 2.23.19 2.23.19v2.47h-1.26c-1.24 0-1.63.77-1.63 1.56v1.88h2.78l-.45 2.9h-2.33v7a10 10 0 0 0 8.44-9.9c0-5.53-4.5-10.02-10-10.02z"/></svg>
              </span>
              <span>Meta</span>
            </label>
            <label class="chip chip-google">
              <input type="checkbox" id="platformGoogle" checked>
              <span class="chip-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
              </span>
              <span>Google</span>
            </label>
          </div>
          <button id="searchBtn" class="btn-search" onclick="doSearch()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <span>検索</span>
          </button>
        </div>
      </div>

      <!-- Loading -->
      <div id="loading" class="loading hidden">
        <div class="loading-spinner"></div>
        <p id="loadingText">検索中...</p>
      </div>

      <!-- Error -->
      <div id="error" class="error-card hidden">
        <p id="errorText"></p>
      </div>

      <!-- Results -->
      <div id="results" class="hidden">
        <!-- Stats -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">合計LP数</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statDomains">0</div>
            <div class="stat-label">ユニークドメイン</div>
          </div>
          <div class="stat-card stat-meta">
            <div class="stat-value" id="statMeta">0</div>
            <div class="stat-label">Meta</div>
          </div>
          <div class="stat-card stat-google">
            <div class="stat-value" id="statGoogle">0</div>
            <div class="stat-label">Google</div>
          </div>
        </div>

        <!-- Actions -->
        <div class="actions-row">
          <div class="filter-group">
            <button class="filter-btn active" data-filter="all" onclick="filterResults('all', this)">すべて</button>
            <button class="filter-btn" data-filter="Meta" onclick="filterResults('Meta', this)">Meta</button>
            <button class="filter-btn" data-filter="Google" onclick="filterResults('Google', this)">Google</button>
          </div>
          <button class="btn-export" onclick="exportCSV()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            CSV出力
          </button>
        </div>

        <!-- Table -->
        <div class="table-container">
          <table id="resultTable">
            <thead>
              <tr>
                <th class="col-source">媒体</th>
                <th class="col-advertiser">広告主/会社名</th>
                <th class="col-domain">ドメイン</th>
                <th class="col-url">LP URL</th>
                <th class="col-format">形式</th>
                <th class="col-title">タイトル / CTA</th>
                <th class="col-period">広告出稿期間</th>
              </tr>
            </thead>
            <tbody id="resultBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Powered by <a href="https://www.searchapi.io" target="_blank">SearchAPI.io</a> — Meta Ad Library & Google Ads Transparency Center</p>
    </footer>
  </div>

  <script>
    let allResults = [];
    let currentFilter = 'all';

    function doSearch() {
      const keyword = document.getElementById('keyword').value.trim();
      if (!keyword) {
        document.getElementById('keyword').focus();
        return;
      }

      const platforms = [];
      if (document.getElementById('platformMeta').checked) platforms.push('meta');
      if (document.getElementById('platformGoogle').checked) platforms.push('google');

      if (platforms.length === 0) {
        showError('Meta または Google を選択してください');
        return;
      }

      const country = document.getElementById('country').value;
      const maxPages = parseInt(document.getElementById('maxPages').value);

      // UI state
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('results').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('searchBtn').disabled = true;
      document.getElementById('loadingText').textContent =
        `「${keyword}」を${platforms.map(p => p === 'meta' ? 'Meta' : 'Google').join(' + ')}で検索中...`;

      fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ keyword, platforms, country, max_pages: maxPages })
      })
      .then(r => r.json())
      .then(data => {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('searchBtn').disabled = false;

        if (data.error) {
          showError(data.error);
          return;
        }

        allResults = data.results || [];
        renderResults(allResults);
        updateStats(data);
        document.getElementById('results').classList.remove('hidden');

        // Reset filter
        currentFilter = 'all';
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-filter="all"]').classList.add('active');
      })
      .catch(err => {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('searchBtn').disabled = false;
        showError('通信エラーが発生しました: ' + err.message);
      });
    }

    function renderResults(results) {
      const tbody = document.getElementById('resultBody');
      tbody.innerHTML = '';

      if (results.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">結果がありません</td></tr>';
        return;
      }

      results.forEach(r => {
        const tr = document.createElement('tr');
        const badge = r.source === 'Meta'
          ? '<span class="badge badge-meta">Meta</span>'
          : '<span class="badge badge-google">Google</span>';

        const urlDisplay = r.lp_url
          ? `<a href="${escapeHtml(r.lp_url)}" target="_blank" rel="noopener" title="${escapeHtml(r.lp_url)}">${escapeHtml(truncate(r.lp_url_clean || r.lp_url, 50))}</a>`
          : '<span class="text-muted">—</span>';

        const titleCta = [r.title, r.cta_text].filter(Boolean).join(' / ') || '—';

        // For Google, add details link
        let detailsIcon = '';
        if (r.details_link) {
          detailsIcon = ` <a href="${escapeHtml(r.details_link)}" target="_blank" class="details-link" title="広告詳細">↗</a>`;
        }

        // 広告出稿期間の表示
        let periodDisplay = '—';
        if (r.first_shown || r.last_shown) {
          const start = r.first_shown ? formatDate(r.first_shown) : '不明';
          const end = r.last_shown ? formatDate(r.last_shown) : '配信中';
          periodDisplay = `${start} ～ ${end}`;
        }

        tr.innerHTML = `
          <td>${badge}</td>
          <td class="cell-advertiser">${escapeHtml(r.advertiser || '—')}</td>
          <td class="cell-domain">${escapeHtml(r.domain || '—')}</td>
          <td class="cell-url">${urlDisplay}${detailsIcon}</td>
          <td><span class="format-tag">${escapeHtml(r.ad_format || '—')}</span></td>
          <td class="cell-title">${escapeHtml(truncate(titleCta, 40))}</td>
          <td class="cell-period">${periodDisplay}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function updateStats(data) {
      document.getElementById('statTotal').textContent = data.total || 0;
      document.getElementById('statDomains').textContent = data.domain_count || 0;

      const metaCount = (data.results || []).filter(r => r.source === 'Meta').length;
      const googleCount = (data.results || []).filter(r => r.source === 'Google').length;
      document.getElementById('statMeta').textContent = metaCount;
      document.getElementById('statGoogle').textContent = googleCount;
    }

    function filterResults(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const filtered = filter === 'all'
        ? allResults
        : allResults.filter(r => r.source === filter);
      renderResults(filtered);
    }

    function exportCSV() {
      const data = currentFilter === 'all'
        ? allResults
        : allResults.filter(r => r.source === currentFilter);

      if (data.length === 0) return;

      const keyword = document.getElementById('keyword').value.trim() || 'lp_urls';
      const filterLabel = currentFilter !== 'all' ? currentFilter : '';

      // XMLHttpRequestでblobとしてダウンロード（最も確実な方法）
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/export', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.responseType = 'blob';

      xhr.onload = function() {
        if (xhr.status === 200) {
          const blob = xhr.response;
          const url = window.URL.createObjectURL(blob);

          // Content-Dispositionからファイル名を取得、なければ自作
          let filename = '';
          const disposition = xhr.getResponseHeader('Content-Disposition');
          if (disposition) {
            const utf8Match = disposition.match(/filename\*=UTF-8''(.+)/);
            const plainMatch = disposition.match(/filename="?([^";\n]+)"?/);
            if (utf8Match) filename = decodeURIComponent(utf8Match[1]);
            else if (plainMatch) filename = plainMatch[1];
          }
          if (!filename) {
            const date = new Date().toISOString().slice(0, 10);
            filename = `${keyword}${filterLabel ? '_' + filterLabel : ''}_${date}.csv`;
          }

          const a = document.createElement('a');
          a.style.display = 'none';
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();

          // クリーンアップ
          setTimeout(() => {
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
          }, 100);
        }
      };

      xhr.send(JSON.stringify({ results: data, keyword: keyword, filter: filterLabel }));
    }

    function showError(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('error').classList.remove('hidden');
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function truncate(str, len) {
      return str && str.length > len ? str.slice(0, len) + '…' : (str || '');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr.slice(0, 10);
        return d.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });
      } catch {
        return dateStr.slice(0, 10);
      }
    }

    // Enter key to search
    document.getElementById('keyword').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
  </script>
</body>
</html>
